---
- name: Stop & mask timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: stopped
    enabled: false
    masked: true
  when: ansible_facts['service_mgr'] == 'systemd'

- name: Remove timesyncd
  ansible.builtin.apt:
    name: systemd-timesyncd
    state: absent
    purge: true
    update_cache: true
